pretrain_checkpoint: checkpoints/jepa_pretrain_868k/last_jepa.pt
generator_version: v4

data:
  fasta_paths:
    - data/processed/amp_corpus.fasta
  max_len: 50
  val_ratio: 0.05
  prefix_ratio: 0.5
  min_prefix_len: 3

generator:
  adapter_bottleneck: 128
  decoder_layers: 4
  decoder_nhead: 8
  decoder_ff: 1536
  dropout: 0.1
  max_seq_len: 52
  num_conditions: 3
  d_cond: 128
  cond_dropout: 0.30       # up from 0.15 → stronger CFG signal
  context_dropout: 0.15    # zero context 15% of batches → forces condition usage

train:
  freeze_encoder: true
  epochs: 80
  batch_size: 1536
  lr: 5.0e-4
  weight_decay: 0.01
  fp16: true
  num_workers: 8
  save_dir: checkpoints/generator_868k_v4
  patience: 20
  save_every: 5
  physchem_loss_weight: 0.30   # auxiliary charge+GRAVY MSE loss

wandb:
  enabled: false
  project: jepa-amp
  run_name: finetune_868k_v4_dual
