experiment_id: generation_control_smoke
research_decision: "Verify generation-control evaluation artifacts before formal ablation."
seed: 42
device: cuda
gpu: 0
output_dir: eval_results/generation_control_smoke

data:
  pretrain_config: configs/jepa_pretrain_868k.yaml
  pretrain_checkpoint: checkpoints/jepa_pretrain_868k/last_jepa.pt
  max_context_batches: 4
  batch_size: 32

generation:
  n_per_condition: 8
  temperature: 0.9
  top_p: 0.9
  max_new_tokens: 50

variants:
  - key: weak_conditioning_baseline
    implementation: v2
    checkpoint: checkpoints/generator_868k_v2/best_generator.pt
    config: configs/finetune_868k_v2.yaml
    cfg_scale: 0.0
  - key: adaln_only_baseline
    implementation: v3
    checkpoint: checkpoints/generator_868k_v3/best_generator.pt
    config: configs/finetune_868k_v3.yaml
    cfg_scale: 0.0
  - key: proposed_dual_pathway_decoder
    implementation: v4
    checkpoint: checkpoints/generator_868k_v4/best_generator.pt
    config: configs/finetune_868k_v4.yaml
    cfg_scale: 0.0

targets:
  - key: amp_like
    length: 20
    charge: 5.0
    gravy: 0.31
  - key: high_positive_charge
    length: 10
    charge: 9.16
    gravy: 0.0
  - key: anionic
    length: 15
    charge: -5.0
    gravy: 0.0
