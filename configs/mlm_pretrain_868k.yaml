# MLM pre-training ablation — identical to jepa_pretrain_868k.yaml except:
#   - No predictor_depth / ema_decay (not used by MLMModel)
#   - save_dir points to a separate checkpoint directory
# All other hyperparameters are intentionally unchanged for a clean comparison.

data:
  fasta_paths:
    - data/processed/amp_corpus.fasta
  max_len: 50
  val_ratio: 0.1
  block_size: 4
  num_target_blocks: 2

model:
  d_model: 384
  nhead: 8
  num_layers: 8
  dim_feedforward: 1536
  dropout: 0.1
  max_seq_len: 52

train:
  epochs: 100
  batch_size: 3072
  lr: 3.5e-4
  weight_decay: 0.05
  warmup_steps: 1000
  fp16: true
  num_workers: 10
  prefetch_factor: 4
  save_dir: checkpoints/mlm_pretrain_868k
  save_every: 10

wandb:
  enabled: false
  project: jepa-amp
  run_name: mlm_pretrain_868k_d384
