data:
  fasta_paths:
    - data/processed/amp_corpus.fasta
  max_len: 50
  val_ratio: 0.1
  block_size: 4
  num_target_blocks: 2

model:
  d_model: 512           # was 256; 5x more compute per forward pass
  nhead: 8
  num_layers: 8          # was 6
  dim_feedforward: 2048  # was 1024
  dropout: 0.1
  max_seq_len: 52
  predictor_depth: 2
  ema_decay: 0.996

train:
  epochs: 300
  batch_size: 1024
  lr: 1.0e-4             # lowered from 2e-4; 2e-4 caused loss to diverge after warmup
  weight_decay: 0.05
  warmup_steps: 500      # longer warmup for stability
  fp16: true
  save_dir: checkpoints/jepa_pretrain

wandb:
  enabled: false
  project: jepa-amp
  run_name: jepa_pretrain_d512
