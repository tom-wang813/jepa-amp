experiment_id: generation_control_ablation
research_decision: "Ablation evidence for decoder conditioning components: tests necessity of (1) auxiliary physchem loss and (2) CFG-style dropout."
seed: 42
device: cuda
gpu: 0
output_dir: eval_results/generation_control_ablation

data:
  pretrain_config: configs/jepa_pretrain_868k.yaml
  pretrain_checkpoint: checkpoints/jepa_pretrain_868k/last_jepa.pt
  max_context_batches: 64
  batch_size: 64

generation:
  n_per_condition: 200
  temperature: 0.9
  top_p: 0.9
  max_new_tokens: 50

variants:
  # Baselines (from formal run for comparison anchor)
  - key: weak_conditioning_baseline
    implementation: v2
    checkpoint: checkpoints/generator_868k_v2/best_generator.pt
    config: configs/finetune_868k_v2.yaml
    cfg_scale: 0.0
  - key: adaln_only_baseline
    implementation: v3
    checkpoint: checkpoints/generator_868k_v3/best_generator.pt
    config: configs/finetune_868k_v3.yaml
    cfg_scale: 0.0
  - key: proposed_dual_pathway_decoder
    implementation: v4
    checkpoint: checkpoints/generator_868k_v4/best_generator.pt
    config: configs/finetune_868k_v4.yaml
    cfg_scale: 0.0
  # New ablation variants
  - key: v4_no_aux_loss
    implementation: v4
    checkpoint: checkpoints/generator_868k_v4_no_aux/best_generator.pt
    config: configs/finetune_868k_v4_no_aux.yaml
    cfg_scale: 0.0
  - key: v4_no_cond_dropout
    implementation: v4
    checkpoint: checkpoints/generator_868k_v4_no_dropout/best_generator.pt
    config: configs/finetune_868k_v4_no_dropout.yaml
    cfg_scale: 0.0

targets:
  - key: amp_like
    length: 20
    charge: 5.0
    gravy: 0.31
  - key: high_positive_charge_short
    length: 10
    charge: 9.16
    gravy: 0.0
  - key: very_high_positive_charge
    length: 20
    charge: 13.23
    gravy: 0.0
  - key: neutral_hydrophobic
    length: 15
    charge: 0.0
    gravy: 0.87
  - key: strongly_hydrophobic
    length: 15
    charge: 0.0
    gravy: 1.47
  - key: anionic
    length: 15
    charge: -5.0
    gravy: 0.0
  - key: strongly_anionic
    length: 20
    charge: -9.16
    gravy: 0.0
  - key: long_neutral_hydrophilic
    length: 30
    charge: 0.0
    gravy: -0.69
  - key: cationic_hydrophobic_amp
    length: 15
    charge: 5.0
    gravy: 0.69
  - key: anionic_hydrophilic
    length: 20
    charge: -3.47
    gravy: -0.69
