# Smoke test for MLM pre-training — 2 epochs, tiny batch
data:
  fasta_paths:
    - data/processed/amp_corpus.fasta
  max_len: 50
  val_ratio: 0.1
  block_size: 4
  num_target_blocks: 2

model:
  d_model: 384
  nhead: 8
  num_layers: 8
  dim_feedforward: 1536
  dropout: 0.1
  max_seq_len: 52

train:
  epochs: 2
  batch_size: 64
  lr: 3.5e-4
  weight_decay: 0.05
  warmup_steps: 10
  fp16: true
  num_workers: 2
  prefetch_factor: 2
  save_dir: checkpoints/mlm_pretrain_868k_smoke
  save_every: 2

wandb:
  enabled: false
  project: jepa-amp
  run_name: mlm_pretrain_smoke
