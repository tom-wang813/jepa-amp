pretrain_checkpoint: checkpoints/jepa_pretrain/best_jepa.pt

data:
  fasta_paths:
    - data/processed/amp_corpus.fasta
  max_len: 50
  val_ratio: 0.1
  prefix_ratio: 0.5
  min_prefix_len: 3

generator:
  adapter_bottleneck: 128   # was 64; scaled with d_model
  decoder_layers: 4
  decoder_nhead: 8
  decoder_ff: 2048          # was 1024; match encoder ffn
  dropout: 0.1
  max_seq_len: 52

train:
  freeze_encoder: true
  epochs: 100
  batch_size: 1024
  lr: 1.0e-4
  weight_decay: 0.01
  fp16: true
  save_dir: checkpoints/generator

wandb:
  enabled: false
  project: jepa-amp
  run_name: finetune_d512
