experiment_id: generation_control_diffusion_formal
research_decision: "Evaluate whether the masked diffusion decoder preserves charge controllability with the shared 3-dim conditioning design."
seed: 42
device: cuda
gpu: 0
output_dir: eval_results/generation_control_diffusion

data:
  pretrain_config: configs/jepa_pretrain_868k.yaml
  pretrain_checkpoint: checkpoints/jepa_pretrain_868k/last_jepa.pt
  max_context_batches: 64
  batch_size: 64

generation:
  n_per_condition: 200
  temperature: 0.9
  top_p: 0.9
  max_new_tokens: 50

variants:
  - key: masked_diffusion_decoder
    implementation: diffusion
    checkpoint: checkpoints/generator_868k_diffusion/best_generator.pt
    config: configs/finetune_868k_diffusion.yaml
    cfg_scale: 0.0

targets:
  - key: amp_like
    length: 20
    charge: 5.0
    gravy: 0.31
  - key: high_positive_charge_short
    length: 10
    charge: 9.16
    gravy: 0.0
  - key: very_high_positive_charge
    length: 20
    charge: 13.23
    gravy: 0.0
  - key: neutral_hydrophobic
    length: 15
    charge: 0.0
    gravy: 0.87
  - key: strongly_hydrophobic
    length: 15
    charge: 0.0
    gravy: 1.47
  - key: anionic
    length: 15
    charge: -5.0
    gravy: 0.0
  - key: strongly_anionic
    length: 20
    charge: -9.16
    gravy: 0.0
  - key: long_neutral_hydrophilic
    length: 30
    charge: 0.0
    gravy: -0.69
  - key: cationic_hydrophobic_amp
    length: 15
    charge: 5.0
    gravy: 0.69
  - key: anionic_hydrophilic
    length: 20
    charge: -3.47
    gravy: -0.69
