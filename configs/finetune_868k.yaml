pretrain_checkpoint: checkpoints/jepa_pretrain_868k/last_jepa.pt

data:
  fasta_paths:
    - data/processed/amp_corpus.fasta
  max_len: 50
  val_ratio: 0.05
  prefix_ratio: 0.5
  min_prefix_len: 3

generator:
  adapter_bottleneck: 128
  decoder_layers: 4
  decoder_nhead: 8
  decoder_ff: 1536
  dropout: 0.1
  max_seq_len: 52
  num_conditions: 3

train:
  freeze_encoder: true
  epochs: 30
  batch_size: 1536
  lr: 5.0e-4
  weight_decay: 0.01
  fp16: true
  num_workers: 8
  save_dir: checkpoints/generator_868k
  patience: 10
  save_every: 5

wandb:
  enabled: false
  project: jepa-amp
  run_name: finetune_868k_d384
