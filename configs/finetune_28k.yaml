pretrain_checkpoint: checkpoints/jepa_pretrain_28k/best_jepa.pt

data:
  fasta_paths:
    - data/processed/amp_corpus.fasta
  max_len: 50
  val_ratio: 0.1
  prefix_ratio: 0.5
  min_prefix_len: 3

generator:
  adapter_bottleneck: 96
  decoder_layers: 4
  decoder_nhead: 8
  decoder_ff: 1536
  dropout: 0.1
  max_seq_len: 52

train:
  freeze_encoder: true
  epochs: 80
  batch_size: 768
  lr: 1.0e-4
  weight_decay: 0.01
  fp16: true
  save_dir: checkpoints/generator_28k

wandb:
  enabled: false
  project: jepa-amp
  run_name: finetune_28k_d384
